<!DOCTYPE html>
<html>
<head>
    <title>PNG图标生成器</title>
</head>
<body>
    <h2>BookmarkManager PNG图标生成器</h2>
    <p>此工具可以将SVG图标转换为PNG格式</p>
    
    <canvas id="canvas16" width="16" height="16" style="border: 1px solid #ccc; margin: 5px;"></canvas>
    <canvas id="canvas48" width="48" height="48" style="border: 1px solid #ccc; margin: 5px;"></canvas>
    <canvas id="canvas128" width="128" height="128" style="border: 1px solid #ccc; margin: 5px;"></canvas>
    
    <br><br>
    <button onclick="generateIcons()">生成PNG图标</button>
    <button onclick="downloadIcons()">下载图标</button>
    
    <script>
        function generateIcons() {
            // 生成16x16图标
            const canvas16 = document.getElementById('canvas16');
            const ctx16 = canvas16.getContext('2d');
            drawIcon(ctx16, 16);
            
            // 生成48x48图标
            const canvas48 = document.getElementById('canvas48');
            const ctx48 = canvas48.getContext('2d');
            drawIcon(ctx48, 48);
            
            // 生成128x128图标
            const canvas128 = document.getElementById('canvas128');
            const ctx128 = canvas128.getContext('2d');
            drawIcon(ctx128, 128);
        }
        
        function drawIcon(ctx, size) {
            // 绘制蓝色背景
            ctx.fillStyle = '#007bff';
            ctx.fillRect(0, 0, size, size);
            
            // 绘制白色书签图标
            ctx.fillStyle = 'white';
            const scale = size / 16;
            
            // 绘制书签线条
            ctx.fillRect(4 * scale, 6 * scale, 8 * scale, 1 * scale);
            ctx.fillRect(4 * scale, 8 * scale, 8 * scale, 1 * scale);
            ctx.fillRect(4 * scale, 10 * scale, 6 * scale, 1 * scale);
            
            // 绘制圆点
            ctx.beginPath();
            ctx.arc(3 * scale, 3 * scale, 1 * scale, 0, 2 * Math.PI);
            ctx.fill();
        }
        
        function downloadIcons() {
            // 下载16x16图标
            downloadCanvas('canvas16', 'icon16.png');
            // 下载48x48图标
            downloadCanvas('canvas48', 'icon48.png');
            // 下载128x128图标
            downloadCanvas('canvas128', 'icon128.png');
        }
        
        function downloadCanvas(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        // 页面加载时自动生成图标
        window.onload = function() {
            generateIcons();
        };
    </script>
</body>
</html>
