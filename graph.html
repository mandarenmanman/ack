<!DOCTYPE html>
<html>
<head>
  <title>书签知识图谱</title>
  <meta charset="UTF-8">
  <script src="js/tailwind.js"></script>
  <link rel="stylesheet" href="css/font-awesome.min.css">
  <script src="js/d3.v7.min.js"></script>
  <style>
    body { overflow: hidden; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #1e293b; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .empty-state { display: none; }
    .empty-state.show { display: block; }
  </style>
</head>
<body class="bg-slate-900">
  <div id="app" class="flex w-screen h-screen">
    <!-- 侧边栏 -->
    <aside class="w-72 bg-gradient-to-b from-slate-800 to-slate-900 border-r border-slate-700 p-4 overflow-y-auto scrollbar-thin">
      <!-- 标题 -->
      <header class="flex items-center gap-2 pb-4 border-b border-slate-700 mb-4">
        <div class="w-10 h-10 flex items-center justify-center bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl shadow-lg shadow-cyan-500/20">
          <i class="fas fa-project-diagram text-white text-lg"></i>
        </div>
        <h1 class="text-lg font-bold text-white">知识图谱</h1>
      </header>

      <!-- 控制按钮 -->
      <div class="flex gap-2 mb-6">
        <button id="reloadGraph" class="flex-1 py-2.5 px-3 bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 text-white text-sm font-medium rounded-lg transition shadow-md hover:shadow-lg hover:shadow-cyan-500/25 flex items-center justify-center gap-2">
          <i class="fas fa-redo"></i>
          重新加载
        </button>
        <button id="resetView" class="flex-1 py-2.5 px-3 bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium rounded-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-compress"></i>
          重置
        </button>
      </div>

      <!-- 分类筛选 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">分类筛选</h3>
        <div id="categoryFilters" class="flex flex-wrap gap-2"></div>
      </div>

      <!-- 图例 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">图例</h3>
        <div id="legend" class="space-y-2"></div>
      </div>

      <!-- 统计信息 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">统计信息</h3>
        <div class="grid grid-cols-2 gap-2">
          <div class="bg-slate-700/50 rounded-lg p-3">
            <div class="text-xs text-slate-400 mb-1">书签总数</div>
            <div id="bookmarkCount" class="text-2xl font-bold text-cyan-400">0</div>
          </div>
          <div class="bg-slate-700/50 rounded-lg p-3">
            <div class="text-xs text-slate-400 mb-1">节点数</div>
            <div id="nodeCount" class="text-2xl font-bold text-cyan-400">0</div>
          </div>
          <div class="bg-slate-700/50 rounded-lg p-3">
            <div class="text-xs text-slate-400 mb-1">边数</div>
            <div id="edgeCount" class="text-2xl font-bold text-cyan-400">0</div>
          </div>
          <div class="bg-slate-700/50 rounded-lg p-3">
            <div class="text-xs text-slate-400 mb-1">分类数</div>
            <div id="categoryCount" class="text-2xl font-bold text-cyan-400">0</div>
          </div>
        </div>
      </div>

      <!-- 链接统计 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">
          <i class="fas fa-trophy text-yellow-500 mr-1"></i>Top 链接
        </h3>
        <div id="linkStats" class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin"></div>
      </div>

      <!-- 图谱生成与设置 -->
      <div class="mb-6 space-y-3">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">数据同步与设置</h3>
        
        <div id="syncStatus" class="p-3 bg-slate-800 rounded-lg border border-slate-700 shadow-inner">
          <div class="text-slate-500 text-xs flex items-center gap-2">
            <i class="fas fa-circle-notch fa-spin"></i>检测同步状态...
          </div>
        </div>

        <button id="analyzeBookmarks" class="w-full py-2 px-3 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-medium rounded-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-redo-alt"></i>
          全量重新分析 (覆盖现有数据)
        </button>
        
        <div id="analyzeStatus" class="hidden flex items-center gap-2 p-2 bg-slate-800 rounded-lg text-xs">
          <i class="fas fa-circle-notch fa-spin text-cyan-400 font-bold"></i>
          <span class="text-slate-300"></span>
        </div>

        <button id="openSettings" class="w-full py-2.5 px-3 bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium rounded-lg transition flex items-center justify-center gap-2">
          <i class="fas fa-cog"></i>
          AI 接口配置
        </button>
      </div>
    </aside>

    <!-- 图谱内容区 -->
    <main class="flex-1 relative overflow-hidden">
      <div id="graph" class="absolute inset-0"></div>

      <!-- Tooltip -->
      <div id="nodeTooltip" class="absolute pointer-events-none opacity-0 transition-opacity duration-200 z-50">
        <div class="bg-slate-800/95 backdrop-blur-sm border border-cyan-500/30 rounded-xl p-4 shadow-2xl shadow-cyan-500/10 max-w-xs">
          <div class="tooltip-title text-cyan-400 font-semibold mb-2"></div>
          <div class="tooltip-url text-slate-400 text-xs mb-2 truncate"></div>
          <div class="flex items-center gap-2 text-xs">
            <span class="text-slate-500">分类:</span>
            <span class="tooltip-category text-slate-300"></span>
          </div>
          <div class="flex items-center gap-2 text-xs mt-1">
            <span class="text-slate-500">连接数:</span>
            <span class="tooltip-connections text-cyan-400 font-bold"></span>
          </div>
        </div>
      </div>

      <!-- 空状态 -->
      <div id="emptyState" class="empty-state absolute inset-0 flex items-center justify-center bg-slate-900/90 z-10">
        <div class="text-center">
          <div class="text-6xl mb-4">📭</div>
          <h2 class="text-xl font-semibold text-white mb-2">暂无图谱数据</h2>
          <p class="text-slate-400 mb-6">点击左侧"分析生成新图谱"立即开始，或检查AI配置</p>
          <button id="goToSettings" class="py-3 px-6 bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-xl transition flex items-center gap-2 mx-auto shadow-lg">
            <i class="fas fa-cog"></i>
            检查 AI 配置
          </button>
        </div>
      </div>
    </main>

    <!-- 右侧边栏 -->
    <aside class="w-64 bg-slate-800 border-l border-slate-700 p-4 overflow-y-auto scrollbar-thin">
      <!-- 目录创建时间 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 flex items-center">
          <i class="fas fa-folder-open text-yellow-500 mr-2"></i>一级目录创建时间
        </h3>
        <div id="dirTimeStats" class="space-y-1 text-sm bg-slate-900/50 rounded-lg p-3 border border-slate-700/50">
          <div class="text-slate-500 text-xs text-center py-2">加载中...</div>
        </div>
      </div>

      <!-- 年份统计 -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 flex items-center">
          <i class="fas fa-chart-bar text-cyan-400 mr-2"></i>按年份统计
        </h3>
        <div id="yearStats" class="space-y-2 text-sm bg-slate-900/50 rounded-lg p-3 border border-slate-700/50">
          <div class="text-slate-500 text-xs text-center py-2">加载中...</div>
        </div>
      </div>
    </aside>
  </div>

  <script src="js/ai-service.js"></script>
  <script src="js/graph.js"></script>
</body>
</html>
